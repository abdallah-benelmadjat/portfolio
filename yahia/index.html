<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script>
        async function tryRedirect() {
            const targetUrl = "https://7a1b-2600-1700-b500-72af-e978-522f-cb49-88ba.ngrok-free.app";
            
            try {
                // 1. We try to 'poke' ngrok with the secret header
                await fetch(targetUrl, {
                    method: 'GET',
                    mode: 'no-cors', // Needed because of browser security
                    headers: {
                        'ngrok-skip-browser-warning': 'true'
                    }
                });
                
                // 2. Now we try to move the human user there
                window.location.href = targetUrl;
            } catch (e) {
                window.location.href = targetUrl;
            }
        }
        window.onload = tryRedirect;
    </script>
</head>
<body style="background: #111; color: white; text-align: center; font-family: sans-serif;">
    <p>Loading project safely...</p>
</body>
</html>
