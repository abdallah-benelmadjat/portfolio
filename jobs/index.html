*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.logo span { color: var(--text-dim); }

#last-updated {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
}

/* ── STATS BAR ── */
#stats-bar {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}

.stat {
  flex: 1;
  background: var(--surface);
  padding: 0.9rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stat-value {
  font-family: 'Space Mono', monospace;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

/* ── CONTROLS ── */
#controls {
  padding: 1.25rem 2rem;
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  align-items: center;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 60px;
  z-index: 99;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 220px;
}

.search-wrap svg {
  position: absolute;
  left: 0.75rem;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--muted);
  pointer-events: none;
}

input[type="text"] {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  padding: 0.55rem 0.75rem 0.55rem 2.25rem;
  outline: none;
  transition: border-color 0.15s;
}

input[type="text"]:focus { border-color: var(--accent); }
input[type="text"]::placeholder { color: var(--muted); }

select, button {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  padding: 0.55rem 0.85rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}

select:focus { border-color: var(--accent); }

button#refresh {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

button#refresh:hover { background: #d97706; }
button#refresh svg { width: 14px; height: 14px; }

.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
  color: var(--text-dim);
  white-space: nowrap;
}

.toggle {
  position: relative;
  width: 36px;
  height: 20px;
}

.toggle input { opacity: 0; width: 0; height: 0; }

.slider {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 20px;
  transition: background 0.2s;
  cursor: pointer;
}

.slider::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  left: 3px; top: 3px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}

.toggle input:checked + .slider { background: var(--accent); }
.toggle input:checked + .slider::before { transform: translateX(16px); }

/* ── ACTIVE FILTERS ── */
#active-filters {
  padding: 0 2rem 0.75rem;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.filter-chip {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0.25rem 0.65rem;
  font-size: 0.78rem;
  color: var(--text-dim);
}

.filter-chip button {
  background: none;
  border: none;
  padding: 0;
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1;
  cursor: pointer;
}

/* ── RESULT COUNT ── */
#result-meta {
  padding: 0 2rem 1rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
}

/* ── GRID ── */
#grid {
  padding: 0 2rem 4rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1px;
  background: var(--border);
}

/* ── CARD ── */
.card {
  background: var(--surface);
  padding: 1.4rem;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
  text-decoration: none;
  color: inherit;
  transition: background 0.15s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: transparent;
  transition: background 0.15s;
}

.card:hover { background: var(--surface2); }
.card:hover::before { background: var(--accent); }

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.85rem;
}

/* Added a wrapper for the left side of the header to push the score to the right */
.header-left {
  display: flex;
  align-items: flex-start;
  gap: 0.85rem;
  flex: 1;
  min-width: 0;
}

.company-logo {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  object-fit: contain;
  flex-shrink: 0;
  padding: 4px;
}

.card-title-block { flex: 1; min-width: 0; }

.card-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 0.2rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-company {
  font-size: 0.8rem;
  color: var(--accent2);
  font-weight: 500;
}

/* ── COMPATIBILITY SCORE BADGES ── */
.card-score {
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 0.3rem 0.55rem;
  border-radius: 6px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.score-high { 
  background: rgba(52,211,153,0.15); 
  color: var(--green); 
  border: 1px solid rgba(52,211,153,0.3); 
}
.score-med { 
  background: rgba(245,158,11,0.15); 
  color: var(--accent); 
  border: 1px solid rgba(245,158,11,0.3); 
}
.score-low { 
  background: rgba(248,113,113,0.15); 
  color: var(--red); 
  border: 1px solid rgba(248,113,113,0.3); 
}
.score-none { 
  background: var(--surface2); 
  color: var(--muted); 
  border: 1px solid var(--border); 
  font-size: 0.75rem; 
  font-weight: 500;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.meta-chip {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.72rem;
  color: var(--text-dim);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.15rem 0.45rem;
}

.meta-chip svg { width: 10px; height: 10px; }

.badge-intern {
  background: rgba(245,158,11,0.15);
  border-color: rgba(245,158,11,0.4);
  color: var(--accent);
  font-weight: 600;
}

.badge-repost {
  background: rgba(248,113,113,0.1);
  border-color: rgba(248,113,113,0.3);
  color: var(--red);
}

.badge-new {
  background: rgba(52,211,153,0.1);
  border-color: rgba(52,211,153,0.3);
  color: var(--green);
}

.card-desc {
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 0.5rem;
  border-top: 1px solid var(--border);
}

.card-date {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
}

.copy-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.2rem 0.5rem;
  font-size: 0.68rem;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.copy-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ── EMPTY/LOADING ── */
#status-msg {
  grid-column: 1 / -1;
  text-align: center;
  padding: 5rem 2rem;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin: 0 auto 1rem;
  animation: spin 0.8s linear infinite;
}

/* ── PAGINATION ── */
#pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 2rem;
}

#pagination button {
  padding: 0.45rem 1rem;
  font-size: 0.85rem;
}

#pagination button:disabled {
  opacity: 0.3;
  cursor: default;
}

#pagination button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 600;
}

#page-info {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  padding: 0 0.5rem;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  #controls { padding: 1rem; }
  #grid { padding: 0 0 4rem; }
  .stat { padding: 0.75rem 1rem; }
  #stats-bar { overflow-x: auto; }
}

const desc = (job.description || &#39;&#39;).trim();
const postedStr = job.posted
  ? `${new Date(job.posted).toLocaleDateString()} · ${daysAgo !== null ? daysAgo + &#39;d ago&#39; : &#39;&#39;}`
  : (job.posted_r || &#39;—&#39;);

const loc = job.loc || job.location || &#39;&#39;;

// ADDED: Compatibility Score Generation
const rawScore = job.compatibility;
let scoreBadge = &#39;&#39;;

if (rawScore !== null &amp;&amp; rawScore !== undefined) {
  const score = Number(rawScore);
  let scoreClass = &#39;score-low&#39;;
  if (score &gt;= 80) scoreClass = &#39;score-high&#39;;
  else if (score &gt;= 50) scoreClass = &#39;score-med&#39;;
  scoreBadge = `&lt;div class=&quot;card-score ${scoreClass}&quot;&gt;${score}%&lt;/div&gt;`;
} else {
  scoreBadge = `&lt;div class=&quot;card-score score-none&quot;&gt;Unscored&lt;/div&gt;`;
}

return `
&lt;a href=&quot;${job.link || &#39;#&#39;}&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; class=&quot;card&quot;&gt;
  &lt;div class=&quot;card-header&quot;&gt;
    &lt;div class=&quot;header-left&quot;&gt;
      &lt;img class=&quot;company-logo&quot;
           src=&quot;${logoUrl}&quot;

           onerror=&quot;this.style.display=&#39;none&#39;&quot;&gt;
      &lt;div class=&quot;card-title-block&quot;&gt;
        &lt;div class=&quot;card-title&quot;&gt;${escHtml(job.title || &#39;Untitled&#39;)}&lt;/div&gt;

    ${scoreBadge}
  &lt;/div&gt;
  &lt;div class=&quot;card-meta&quot;&gt;
    ${loc ? `&lt;span class=&quot;meta-chip&quot;&gt;&lt;svg viewBox=&quot;0 0 20 20&quot; fill=&quot;currentColor&quot;&gt;&lt;path fill-rule=&quot;evenodd&quot; d=&quot;M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z&quot; clip-rule=&quot;evenodd&quot;/&gt;&lt;/svg&gt;${escHtml(loc)}&lt;/span&gt;` : &#39;&#39;}
    ${badges}

  ${desc ? `&lt;div class=&quot;card-desc&quot;&gt;${escHtml(desc)}&lt;/div&gt;` : &#39;&#39;}
  &lt;div class=&quot;card-footer&quot;&gt;
    &lt;div class=&quot;card-date&quot;&gt;${escHtml(postedStr)}&lt;/div&gt;
    &lt;button class=&quot;copy-btn&quot; onclick=&quot;copyLink(event, &#39;${(job.link||&#39;&#39;).replace(/&#39;/g,&#39;&#39;)}&#39;)&quot;&gt;Copy link&lt;/button&gt;
  &lt;/div&gt;
&lt;/a&gt;`;
```

}).join('');
}

// ── PAGINATION ───────────────────────────────────────────
function renderPagination() {
const pg = document.getElementById('pagination');
const total = Math.ceil(filtered.length / PAGE\_SIZE);
if (total \<= 1) { pg.innerHTML = ''; return; }

const prev = `&lt;button ${page===1?&#39;disabled&#39;:&#39;&#39;} onclick=&quot;goPage(${page-1})&quot;&gt;← Prev&lt;/button&gt;`;
const next = `&lt;button ${page===total?&#39;disabled&#39;:&#39;&#39;} onclick=&quot;goPage(${page+1})&quot;&gt;Next →&lt;/button&gt;`;
const info = `&lt;span id=&quot;page-info&quot;&gt;Page ${page} / ${total}&lt;/span&gt;`;

// Page number buttons (show max 5 around current)
let nums = '';
for (let i = 1; i \<= total; i++) {
if (i===1 || i===total || (i\>=page-2 && i\<=page+2)) {
nums += `&lt;button class=&quot;${i===page?&#39;active&#39;:&#39;&#39;}&quot; onclick=&quot;goPage(${i})&quot;&gt;${i}&lt;/button&gt;`;
} else if (i===page-3 || i===page+3) {
nums += `&lt;span id=&quot;page-info&quot;&gt;…&lt;/span&gt;`;
}
}

pg.innerHTML = prev + nums + next + info;
}

function goPage(n) {
page = n;
renderPage();
renderPagination();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── UTILITIES ────────────────────────────────────────────
function daysSince(iso) {
if (\!iso) return null;
const diff = Date.now() - new Date(iso).getTime();
return Math.floor(diff / 86400000);
}

function escHtml(str) {
return String(str)
.replace(/&/g,'\&amp;').replace(/\</g,'\&lt;').replace(/\>/g,'\&gt;')
.replace(/"/g,'\&quot;').replace(/'/g,'&\#39;');
}

function copyLink(e, url) {
e.preventDefault();
e.stopPropagation();
navigator.clipboard.writeText(url).then(() =\> {
const btn = e.target;
btn.textContent = 'Copied\!';
setTimeout(() =\> btn.textContent = 'Copy link', 1500);
});
}
